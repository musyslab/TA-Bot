
name: Docker Build and Push

on:
  push:
    branches: [ "CarrollTABot-3-11-26" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend Docker image
        working-directory: frontend
        run: |
          docker build -f Dockerfile.prod -t ghcr.io/musyslab/tabot-carroll-frontend:latest .

      - name: Push frontend Docker image
        run: |
          docker push ghcr.io/musyslab/tabot-carroll-frontend:latest

      - name: Build backend Docker image
        working-directory: backend
        run: |
          docker build -f Dockerfile.prod -t ghcr.io/musyslab/tabot-carroll-backend:latest .

      - name: Push backend Docker image
        run: |
          docker push ghcr.io/musyslab/tabot-carroll-backend:latest
